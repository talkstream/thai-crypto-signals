name: Scorecard supply-chain security

on:
  push:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1' # weekly, Monday 03:27 UTC
  workflow_dispatch:

# Top-level read-all: Scorecard's checks read repo, workflow and CI metadata.
permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Job-level permissions REPLACE the top-level read-all for this job, so the read scopes
      # Scorecard's checks need must be listed explicitly alongside the OIDC token.
      contents: read
      actions: read
      id-token: write # publish results to the public Scorecard API (renders the badge)
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to api.scorecard.dev so the README badge renders. We deliberately do NOT
          # upload-sarif into GitHub code-scanning: that tab is reserved for CodeQL findings about
          # OUR code, not Scorecard's repo-practice checks (branch-protection, code-review, etc.,
          # which are visible via the badge link). Keeps the Security tab a true CodeQL signal.
          publish_results: true
